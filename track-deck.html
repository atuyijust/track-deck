<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect } = React;

// ---- Camelot key logic ----
const MAJOR_CAMELOT = ["8B","3B","10B","5B","12B","7B","2B","9B","4B","11B","6B","1B"];
const MINOR_CAMELOT = ["5A","12A","7A","2A","9A","4A","11A","6A","1A","8A","3A","10A"];
const NOTE_TO_PC = { "C":0,"C#":1,"DB":1,"D":2,"D#":3,"EB":3,"E":4,"F":5,"F#":6,"GB":6,"G":7,"G#":8,"AB":8,"A":9,"A#":10,"BB":10,"B":11,"CB":11 };

function toCamelot(rawKey, rawMode) {
  if (rawKey == null || rawKey === "") return null;
  const s = String(rawKey).trim().toUpperCase();
  const cm = s.match(/^(\d{1,2})\s*([AB])$/);
  if (cm) { const n = +cm[1]; if (n >= 1 && n <= 12) return n + cm[2]; }
  if (/^-?\d+$/.test(s)) {
    const pc = +s;
    if (pc < 0 || pc > 11) return null;
    const isMinor = rawMode != null ? (+rawMode === 0) : true;
    return isMinor ? MINOR_CAMELOT[pc] : MAJOR_CAMELOT[pc];
  }
  const tm = s.match(/^([A-G][#B]?)\s*(M(?![AI])|MIN(?:OR)?|MAJ(?:OR)?)?$/);
  if (tm) {
    const pc = NOTE_TO_PC[tm[1]];
    if (pc == null) return null;
    const q = tm[2] || "";
    const isMinor = q.startsWith("MIN") || q === "M";
    return isMinor ? MINOR_CAMELOT[pc] : MAJOR_CAMELOT[pc];
  }
  return null;
}

function parseKey(k) { return { num: parseInt(k, 10), mode: k.slice(-1) }; }

function keyRelation(from, to) {
  const a = parseKey(from), b = parseKey(to);
  const diff = ((b.num - a.num) + 12) % 12;
  if (a.mode === b.mode) {
    if (diff === 0) return { score: 3, label: "同キー" };
    if (diff === 1) return { score: 3, label: "+1 上行" };
    if (diff === 11) return { score: 3, label: "-1 下行" };
    if (diff === 2) return { score: 1, label: "+2 ブースト" };
  } else {
    if (diff === 0) return { score: 3, label: "平行調" };
    if (a.mode === "A" && diff === 1) return { score: 1, label: "対角" };
  }
  return { score: 0, label: "不一致" };
}

function bpmScore(from, to) {
  const diff = Math.abs(to - from) / from;
  if (diff <= 0.03) return { score: 3, pct: diff };
  if (diff <= 0.06) return { score: 2, pct: diff };
  if (diff <= 0.10) return { score: 1, pct: diff };
  return { score: 0, pct: diff };
}

// ---- Spotify link ----
function toSpotifyUrl(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  const m = s.match(/spotify:track:([A-Za-z0-9]+)/);
  if (m) return "https://open.spotify.com/track/" + m[1];
  if (s.startsWith("https://open.spotify.com/")) return s.split("?")[0];
  return null;
}

// ---- CSV column auto-detection ----
const COL_GUESS = {
  title:  ["track name","name","title","track","song","曲名"],
  artist: ["artist name(s)","artist name","artists","artist","アーティスト"],
  bpm:    ["tempo","bpm"],
  key:    ["key","camelot","initial key","キー"],
  mode:   ["mode"],
  energy: ["energy"],
  genre:  ["artist genres","genres","genre","ジャンル"],
  label:  ["record label","label","レーベル","publisher"],
  year:   ["release date","album release date","year","released","リリース"],
  url:    ["track uri","spotify uri","spotify url","track url","uri","url","link"],
};

function guessColumns(headers) {
  const lower = headers.map(h => h.toLowerCase().trim());
  const pick = (cands) => {
    for (const c of cands) { const i = lower.indexOf(c); if (i >= 0) return headers[i]; }
    for (const c of cands) { const i = lower.findIndex(h => h.includes(c)); if (i >= 0) return headers[i]; }
    return "";
  };
  const out = {};
  for (const [field, cands] of Object.entries(COL_GUESS)) out[field] = pick(cands);
  return out;
}

// ---- Tagging ----
const PRESET_TAGS = ["ピークタイム","つなぎ","イントロ長め","フロア検証済","オープナー","クローザー"];
const trackKey = t => (t.artist + "␟" + t.title).toLowerCase();

// ---- Demo library ----
const SEED = [
  ["Rings Around Saturn","Deepchord",122,"5A",2,"dub techno"],["Minus","Rod Modell",118,"5A",2,"dub techno"],
  ["Phylyps Trak II","Basic Channel",126,"6A",3,"dub techno, minimal"],["Aquadrive","Maurizio",128,"7A",4,"dub techno"],
  ["Zug Island","Echospace",120,"4A",2,"dub techno, ambient techno"],["Sea of Clouds","Yagya",118,"12A",1,"ambient techno"],
  ["Ghost Frequency","Fluxion",124,"6A",3,"dub techno"],["Systemic","Monolake",126,"8A",3,"minimal, idm"],
  ["Immersion","Deadbeat",120,"5B",2,"dub techno, dub"],["Reverse Rotation","Function",130,"7A",5,"techno"],
  ["Spastik","Plastikman",132,"8A",5,"techno, minimal"],["Departure","Wata Igarashi",128,"9A",4,"techno, trance"],
];
const DEMO = SEED.map((t,i)=>({ id:i, title:t[0], artist:t[1], bpm:t[2], key:t[3], energy:t[4], genre:t[5], year:[2011,2007,1994,1997,2007,2009,2004,2001,2011,2013,1993,2018][i] ?? null, label:["Modern Love","Plop","Basic Channel","M","echospace [detroit]","Sending Orbs","Chain Reaction","Imbalance Computer Music","BLKRTZ","Ostgut Ton","NovaMute","Midgar"][i] ?? "", url:null }));

// ---- UI atoms ----
function EnergyBars({ level }) {
  if (!level) return <span style={{ color:"#3A464B", fontSize:11 }}>—</span>;
  return (
    <span style={{ display:"inline-flex", gap:2, alignItems:"flex-end" }}>
      {[1,2,3,4,5].map(i => (
        <span key={i} style={{ width:3, height:3+i*2, borderRadius:1,
          background: i<=level ? "#E0A458" : "#2A3438" }} />
      ))}
    </span>
  );
}

function KeyChip({ k }) {
  if (!k) return <span style={{ color:"#3A464B", fontSize:11 }}>—</span>;
  const isA = k.endsWith("A");
  return (
    <span style={{ fontFamily:"'IBM Plex Mono', monospace", fontSize:11, padding:"2px 7px",
      borderRadius:3, letterSpacing:0.5, whiteSpace:"nowrap",
      background:isA?"rgba(127,184,173,0.14)":"rgba(148,166,196,0.14)",
      color:isA?"#7FB8AD":"#94A6C4",
      border:`1px solid ${isA?"rgba(127,184,173,0.3)":"rgba(148,166,196,0.3)"}` }}>{k}</span>
  );
}

function SpotifyBtn({ url, size = 26 }) {
  if (!url) return null;
  return (
    <a href={url} target="_blank" rel="noopener noreferrer"
      onClick={e => e.stopPropagation()}
      style={{ display:"inline-flex", alignItems:"center", justifyContent:"center",
        width:size, height:size, borderRadius:"50%", flexShrink:0,
        background:"rgba(30,215,96,0.12)", border:"1px solid rgba(30,215,96,0.35)",
        color:"#1ED760", fontSize:size*0.42, textDecoration:"none" }}>
      ▶
    </a>
  );
}

function SpotifyEmbed({ url }) {
  if (!url) return null;
  const m = url.match(/track\/([A-Za-z0-9]+)/);
  if (!m) return null;
  return (
    <iframe
      src={"https://open.spotify.com/embed/track/" + m[1] + "?theme=0"}
      width="100%" height="80" frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"
      style={{ borderRadius:8, marginTop:10, display:"block", border:"none" }}
      title="Spotify player" />
  );
}

const S = {
  panel: { background:"#141A1D", border:"1px solid #222B2F", borderRadius:8 },
  mono: { fontFamily:"'IBM Plex Mono', monospace" },
  label: { fontFamily:"'IBM Plex Mono', monospace", fontSize:10, letterSpacing:2, color:"#5C6B70", textTransform:"uppercase" },
  // iOS Safariは入力欄のフォントが16px未満だと自動ズームするため、必ず16px
  input: { background:"#0D1113", border:"1px solid #2A3438", borderRadius:6, padding:"9px 10px", color:"#DCE4E2", fontSize:16, fontFamily:"inherit" },
};

const RENDER_LIMIT = 150;

const SORT_OPTIONS = [
  ["", "並び替えなし"],
  ["bpm:1", "BPM 低→高"], ["bpm:-1", "BPM 高→低"],
  ["key:1", "KEY 1A→12B"], ["key:-1", "KEY 12B→1A"],
  ["energy:1", "Energy 低→高"], ["energy:-1", "Energy 高→低"],
  ["year:-1", "年 新→古"], ["year:1", "年 古→新"],
  ["title:1", "曲名 A→Z"],
];

function TrackDeck() {
  const [lib, setLib] = useState(() => { try { const s = localStorage.getItem("td_lib"); if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length) return p; } } catch {} return DEMO; });
  const [source, setSource] = useState(() => { try { return localStorage.getItem("td_src") || "demo"; } catch { return "demo"; } });
  const [importStats, setImportStats] = useState(null);
  const [mappingState, setMappingState] = useState(null);
  const fileRef = useRef(null);
  const tagFileRef = useRef(null);

  const [q, setQ] = useState("");
  const [bpmMin, setBpmMin] = useState("");
  const [bpmMax, setBpmMax] = useState("");
  const [keyFilter, setKeyFilter] = useState("");
  const [genreFilter, setGenreFilter] = useState("");
  const [decadeFilter, setDecadeFilter] = useState("");
  const [activeTags, setActiveTags] = useState([]);
  const [selected, setSelected] = useState(null);
  const [setList, setSetList] = useState(() => { try { return JSON.parse(localStorage.getItem("td_set") || "[]"); } catch { return []; } });
  const [sortKey, setSortKey] = useState("");
  const [showFilters, setShowFilters] = useState(false);
  const [playlistName, setPlaylistName] = useState("");
  const [exportState, setExportState] = useState(null); // null | "loading" | {ok, msg}
  const [sugMode, setSugMode] = useState("smooth"); // smooth | shift | bpm | energy
  const [shuffleTick, setShuffleTick] = useState(0);

  // mobile detection + tabs
  const [isMobile, setIsMobile] = useState(false);
  const [tab, setTab] = useState("lib"); // lib | next | set
  useEffect(() => {
    const mq = window.matchMedia("(max-width: 700px)");
    const upd = () => setIsMobile(mq.matches);
    upd();
    mq.addEventListener("change", upd);
    return () => mq.removeEventListener("change", upd);
  }, []);

  // ---- localStorage persistence ----
  useEffect(() => { try { localStorage.setItem("td_tags", JSON.stringify(tagMap)); } catch {} }, [tagMap]);
  useEffect(() => { try { localStorage.setItem("td_ctags", JSON.stringify(customTags)); } catch {} }, [customTags]);
  useEffect(() => { try { localStorage.setItem("td_set", JSON.stringify(setList)); } catch {} }, [setList]);
  useEffect(() => {
    if (source !== "csv") return;
    try {
      localStorage.setItem("td_lib", JSON.stringify(lib));
      localStorage.setItem("td_src", "csv");
    } catch (e) { console.warn("ライブラリの保存に失敗(容量超過の可能性)", e); }
  }, [lib, source]);

  const resetAll = () => {
    if (window.confirm("保存データ(ライブラリ・タグ・セット)を全て削除して初期状態に戻しますか?")) {
      try { localStorage.removeItem("td_lib"); localStorage.removeItem("td_src"); localStorage.removeItem("td_tags"); localStorage.removeItem("td_ctags"); localStorage.removeItem("td_set"); } catch {}
      location.reload();
    }
  };

  const [tagMap, setTagMap] = useState(() => { try { return JSON.parse(localStorage.getItem("td_tags") || "{}"); } catch { return {}; } });
  const [customTags, setCustomTags] = useState(() => { try { return JSON.parse(localStorage.getItem("td_ctags") || "[]"); } catch { return []; } });
  const [newTag, setNewTag] = useState("");

  const getTags = (t) => tagMap[trackKey(t)] || [];
  const allTags = useMemo(() => {
    const s = new Set([...PRESET_TAGS, ...customTags]);
    Object.values(tagMap).forEach(arr => arr.forEach(x => s.add(x)));
    return [...s];
  }, [customTags, tagMap]);

  const toggleTrackTag = (t, tag) => {
    const k = trackKey(t);
    setTagMap(m => {
      const cur = m[k] || [];
      const next = cur.includes(tag) ? cur.filter(x => x !== tag) : [...cur, tag];
      const out = { ...m };
      if (next.length) out[k] = next; else delete out[k];
      return out;
    });
  };

  const addCustomTag = () => {
    const t = newTag.trim();
    if (!t || allTags.includes(t)) { setNewTag(""); return; }
    setCustomTags(p => [...p, t]);
    if (selected) toggleTrackTag(selected, t);
    setNewTag("");
  };

  const exportTags = () => {
    const blob = new Blob([JSON.stringify({ version: 1, tags: tagMap }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "yotsuji-tags.json";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const importTags = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data && typeof data.tags === "object") {
          setTagMap(m => ({ ...m, ...data.tags }));
          const imported = new Set();
          Object.values(data.tags).forEach(arr => arr.forEach(x => imported.add(x)));
          setCustomTags(p => [...new Set([...p, ...imported])].filter(x => !PRESET_TAGS.includes(x)));
        }
      } catch { /* ignore invalid JSON */ }
    };
    reader.readAsText(file);
  };

  const onFile = (file) => {
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: (res) => {
        const headers = res.meta.fields || [];
        setMappingState({ headers, rows: res.data, map: guessColumns(headers) });
      },
      error: () => setImportStats({ error: "CSVの読み込みに失敗しました。" }),
    });
  };

  const runImport = () => {
    const { rows, map } = mappingState;
    let noKey = 0, noBpm = 0;
    const tracks = rows.map((r, i) => {
      const bpm = map.bpm ? Math.round(parseFloat(r[map.bpm])) || null : null;
      const key = map.key ? toCamelot(r[map.key], map.mode ? r[map.mode] : null) : null;
      let energy = null;
      if (map.energy) {
        const e = parseFloat(r[map.energy]);
        if (!isNaN(e)) energy = e <= 1 ? Math.round(e * 4) + 1 : Math.min(5, Math.round(e));
      }
      if (!key) noKey++;
      if (!bpm) noBpm++;
      let year = null;
      if (map.year) {
        const ym = String(r[map.year] || "").match(/\d{4}/);
        if (ym) year = +ym[0];
      }
      return {
        id: i,
        title: map.title ? (r[map.title] || "(不明)") : "(不明)",
        artist: map.artist ? (r[map.artist] || "") : "",
        bpm, key, energy, year,
        genre: map.genre ? (r[map.genre] || "") : "",
        label: map.label ? (r[map.label] || "") : "",
        url: map.url ? toSpotifyUrl(r[map.url]) : null,
      };
    }).filter(t => t.title !== "(不明)" || t.artist);

    setLib(tracks);
    setSource("csv");
    setSelected(null);
    setSetList([]);
    setImportStats({ total: tracks.length, noKey, noBpm });
    setMappingState(null);
    setBpmMin(""); setBpmMax(""); setGenreFilter("");
  };

  const genres = useMemo(() => {
    const count = {};
    lib.forEach(t => {
      if (!t.genre) return;
      String(t.genre).split(",").map(g => g.trim().toLowerCase()).filter(Boolean)
        .forEach(g => { count[g] = (count[g] || 0) + 1; });
    });
    return Object.entries(count).sort((a, b) => b[1] - a[1]);
  }, [lib]);

  const decades = useMemo(() => {
    const s = new Set(lib.map(t => t.year).filter(Boolean).map(y => Math.floor(y / 10) * 10));
    return [...s].sort((a, b) => b - a);
  }, [lib]);

  const bpmLo = parseFloat(bpmMin), bpmHi = parseFloat(bpmMax);
  const filtered = useMemo(() => lib.filter(t => {
    if (t.bpm) {
      if (!isNaN(bpmLo) && t.bpm < bpmLo) return false;
      if (!isNaN(bpmHi) && t.bpm > bpmHi) return false;
    }
    if (keyFilter && t.key !== keyFilter) return false;
    if (decadeFilter) {
      if (!t.year || Math.floor(t.year / 10) * 10 !== +decadeFilter) return false;
    }
    if (genreFilter) {
      const gs = String(t.genre || "").split(",").map(g => g.trim().toLowerCase());
      if (!gs.includes(genreFilter)) return false;
    }
    if (activeTags.length) {
      const tt = getTags(t);
      if (!activeTags.every(tag => tt.includes(tag))) return false;
    }
    if (q) {
      const s = (t.title + " " + t.artist + " " + t.genre + " " + (t.label || "")).toLowerCase();
      if (!s.includes(q.toLowerCase())) return false;
    }
    return true;
  }), [lib, q, bpmLo, bpmHi, keyFilter, genreFilter, decadeFilter, activeTags, tagMap]);

  const sorted = useMemo(() => {
    if (!sortKey) return filtered;
    const [col, dirS] = sortKey.split(":");
    const dir = +dirS;
    const val = t => {
      if (col === "title") return (t.title || "").toLowerCase();
      if (col === "bpm") return t.bpm ?? null;
      if (col === "key") return t.key ? parseInt(t.key) * 2 + (t.key.endsWith("B") ? 1 : 0) : null;
      if (col === "energy") return t.energy ?? null;
      if (col === "year") return t.year ?? null;
      return null;
    };
    return [...filtered].sort((a, b) => {
      const va = val(a), vb = val(b);
      if (va == null && vb == null) return 0;
      if (va == null) return 1;
      if (vb == null) return -1;
      return (va < vb ? -1 : va > vb ? 1 : 0) * dir;
    });
  }, [filtered, sortKey]);

  const gTokens = (t) => new Set(String(t.genre || "").split(",").map(g => g.trim().toLowerCase()).filter(Boolean));

  const suggestions = useMemo(() => {
    if (!selected || !selected.key || !selected.bpm) return [];
    const selG = gTokens(selected);
    const inSet = new Set(setList.map(x => x.id));
    const cands = [];
    for (const t of lib) {
      if (t.id === selected.id || inSet.has(t.id)) continue;
      if (!t.key || !t.bpm) continue;
      const kr = keyRelation(selected.key, t.key);
      const br = bpmScore(selected.bpm, t.bpm);
      if (Math.abs(t.bpm - selected.bpm) > 5) continue; // 全モード共通: BPM振り幅は±5以内
      const eDelta = (t.energy && selected.energy) ? t.energy - selected.energy : 0;
      const tg = gTokens(t);
      let ov = 0; selG.forEach(g => { if (tg.has(g)) ov++; });
      let score = null;
      if (sugMode === "smooth") {
        // 同系統: キー互換 × 近BPM × ジャンル共通 × エナジー変化小
        if (kr.score === 0 || br.score === 0) continue;
        score = kr.score * 2 + br.score + Math.min(ov, 3) * 1.5 - Math.abs(eDelta);
      } else if (sugMode === "genre") {
        // 同じジャンル: ジャンルが1つ以上重なる曲に限定
        if (ov === 0) continue;
        score = ov * 2 + kr.score + br.score - Math.abs(eDelta) * 0.5;
      } else if (sugMode === "shift") {
        // 雰囲気を変える: ジャンルが被らない曲を優先、エナジー変化は歓迎
        if (selG.size && tg.size && ov > 0) continue;
        score = kr.score + br.score + Math.abs(eDelta) * 1.5 + (kr.score > 0 ? 1 : 0);
      } else if (sugMode === "bpm") {
        // BPM維持: ±2以内をさらに厳守、キーは合えばボーナス(不一致でも候補に残す)
        if (Math.abs(t.bpm - selected.bpm) > 2) continue;
        score = (2 - Math.abs(t.bpm - selected.bpm)) * 2 + kr.score;
      } else if (sugMode === "energy") {
        // 上げる: エナジー+1以上、キー・BPMはつながる範囲
        if (!t.energy || !selected.energy) continue;
        if (eDelta < 1) continue;
        if (kr.score === 0 || br.score === 0) continue;
        score = eDelta * 2 + kr.score + br.score;
      } else if (sugMode === "era") {
        // 同年代: 同じ年代(10年区切り)の曲に限定、年が近くキーが合うほど上位
        if (!t.year || !selected.year) continue;
        if (Math.floor(t.year / 10) !== Math.floor(selected.year / 10)) continue;
        score = kr.score * 1.5 + br.score + (5 - Math.min(5, Math.abs(t.year - selected.year))) * 0.4;
      } else if (sugMode === "down") {
        // 下げる: エナジー-1以下、キー・BPMはつながる範囲
        if (!t.energy || !selected.energy) continue;
        if (eDelta > -1) continue;
        if (kr.score === 0 || br.score === 0) continue;
        score = (-eDelta) * 2 + kr.score + br.score;
      }
      if (score == null) continue;
      cands.push({ t, kr, br, eDelta, score });
    }
    cands.sort((a, b) => b.score - a.score);
    // 上位80曲プールから重み付きシャッフルで選出(毎回顔ぶれが変わる)
    const pool = cands.slice(0, 80).map(s => ({ ...s, j: s.score + Math.random() * 2.5 }));
    pool.sort((a, b) => b.j - a.j);
    const picked = [];
    const artistCount = {};
    for (const s of pool) {
      const a = (s.t.artist || "").toLowerCase();
      if ((artistCount[a] || 0) >= 3) continue;
      picked.push(s);
      artistCount[a] = (artistCount[a] || 0) + 1;
      if (picked.length >= 30) break;
    }
    return picked;
  }, [selected, lib, sugMode, shuffleTick, setList]);

  const addToSet = (t) => setSetList(p => p.some(x => x.id === t.id) ? p : [...p, t]);
  const removeFromSet = (id) => setSetList(p => p.filter(x => x.id !== id));
  const moveInSet = (i, delta) => setSetList(p => {
    const j = i + delta;
    if (j < 0 || j >= p.length) return p;
    const c = [...p];
    [c[i], c[j]] = [c[j], c[i]];
    return c;
  });

  // ---- Spotify playlist export ----
  const setUris = () => setList
    .filter(t => t.url)
    .map(t => {

      return m ? "spotify:track:" + m[1] : null;
    })
    .filter(Boolean);

  const copyUris = async () => {
    const uris = setUris();
    if (!uris.length) { setExportState({ ok: false, msg: "Spotifyリンクを持つ曲がセットにありません。" }); return; }
    try {
      await navigator.clipboard.writeText(uris.join("\n"));
      setExportState({ ok: true, msg: `${uris.length}曲のURIをコピーしました。SpotifyデスクトップアプリのプレイリストにCtrl+V / Cmd+Vで貼り付けられます。` });
    } catch {
      setExportState({ ok: false, msg: "コピーに失敗しました。" });
    }
  };

  const copyForImport = async () => {
    const lines = setList.map(t => `${t.artist} - ${t.title}`);

    try {
      await navigator.clipboard.writeText(lines.join("\n"));
      setExportState({ ok: true, msg: `${lines.length}曲をコピーしました。TuneMyMusicの「テキストから」に貼り付けてください(1行=1曲の「アーティスト - 曲名」形式)。` });

      setExportState({ ok: false, msg: "コピーに失敗しました。" });

    if (!links.length) { setExportState({ ok: false, msg: "Spotifyリンクを持つ曲がセットにありません。" }); return; }
    const skipped = setList.length - links.length;
    try {
      await navigator.clipboard.writeText(links.join("\n"));
      setExportState({ ok: true, msg: `${links.length}曲のリンクをコピーしました${skipped ? `(リンクなし${skipped}曲はスキップ)` : ""}。TuneMyMusicまたはSoundiizの「テキストから取込」に貼り付けると、この曲順のままSpotifyプレイリストが作成できます。` });
    } catch {
      setExportState({ ok: false, msg: "コピーに失敗しました。" });
    }
  };

  const copyTextList = async () => {
    const name = playlistName.trim() || `四辻 set ${new Date().toISOString().slice(0, 10)}`;
    const lines = setList.map((t, i) => `${String(i + 1).padStart(2, "0")}. ${t.artist} - ${t.title}${t.bpm ? ` [${t.bpm}${t.key ? " " + t.key : ""}]` : ""}`);
    try {
      await navigator.clipboard.writeText(`${name}\n${"-".repeat(24)}\n` + lines.join("\n"));
      setExportState({ ok: true, msg: "トラックリスト(テキスト)をコピーしました。" });
    } catch {
      setExportState({ ok: false, msg: "コピーに失敗しました。" });

  const transition = (a, b) => {
    if (!a.key || !b.key || !a.bpm || !b.bpm) return { c:"#5C6B70", txt:"? データ不足" };
    const kr = keyRelation(a.key, b.key);
    const br = bpmScore(a.bpm, b.bpm);
    if (kr.score >= 3 && br.score >= 2) return { c:"#7FB8AD", txt:"◎ " + kr.label };
    if (kr.score >= 1 && br.score >= 1) return { c:"#E0A458", txt:"○ " + kr.label };

  };

  const usedKeys = useMemo(() => {

  const taggedCount = Object.keys(tagMap).length;

              <SpotifyBtn url={selected.url} size={34} />
            </div>
            <div style={{ display:"flex", gap:10, alignItems:"center", marginTop:8 }}>
              <span style={{ ...S.mono, fontSize:13, color:"#B8C4C2" }}>{selected.bpm ?? "—"} BPM</span>

          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
            {[["smooth","同系統"],["genre","同じジャンル"],["era","同年代"],["shift","雰囲気変える"],["bpm","BPM維持"],["energy","⚡上げる"],["down","↓下げる"]].map(([m, l]) => (

          {(!selected.key || !selected.bpm) && (

          {selected.key && selected.bpm && suggestions.length === 0 && (

              {sugMode === "era" && "(選択中の曲と同じ年代の曲を探しています。年情報のないライブラリでは使えません)"}

            </div>

          {suggestions.map(({ t, kr, br, eDelta }) => (

  const SetView = (
    <div style={{ ...S.panel, padding:14 }}>

        ::placeholder{color:#4A585D}
        button{cursor:pointer;font-family:inherit}
        select{background:#0D1113;border:1px solid #2A3438;border-radius:6px;padding:9px 8px;color:#DCE4E2;font-size:16px;font-family:inherit;min-width:0}
        *{box-sizing:border-box}
        body{overflow-x:hidden}
      `}</style>

      <header style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" }}>
        <h1 style={{ margin:0, fontSize: isMobile ? 20 : 26, fontWeight:700, letterSpacing:1 }}>
          四辻 <span style={{ color:"#7FB8AD" }}>TRACK DECK</span>
        </h1>
        <span style={{ ...S.mono, fontSize:10, color:"#5C6B70" }}>
          {lib.length.toLocaleString()} tr · v1.0
        </span>
        <div style={{ marginLeft:"auto", display:"flex", gap:6, flexWrap:"wrap" }}>
          <button onClick={() => fileRef.current?.click()} style={{
            padding:"6px 12px", borderRadius:5, fontSize:12, fontWeight:500,
            border:"1px solid #7FB8AD", background:"rgba(127,184,173,0.12)", color:"#7FB8AD" }}>
            CSV
          </button>
          <button onClick={exportTags} disabled={taggedCount === 0} style={{
            padding:"6px 12px", borderRadius:5, fontSize:12,
            border:"1px solid #2A3438", background:"transparent",
            color: taggedCount ? "#8A9AA0" : "#4A585D" }}>
            タグ保存{taggedCount ? `(${taggedCount})` : ""}
          </button>
          <button onClick={() => tagFileRef.current?.click()} style={{
            padding:"6px 12px", borderRadius:5, fontSize:12,
            border:"1px solid #2A3438", background:"transparent", color:"#8A9AA0" }}>
            タグ復元
          </button>
          <button onClick={resetAll} style={{
            padding:"6px 10px", borderRadius:5, fontSize:12,
            border:"1px solid #2A3438", background:"transparent", color:"#5C6B70" }}>
            初期化
          </button>
        </div>
        <input ref={fileRef} type="file" accept=".csv" style={{ display:"none" }}
          onChange={e => { if (e.target.files?.[0]) onFile(e.target.files[0]); e.target.value = ""; }} />
        <input ref={tagFileRef} type="file" accept=".json" style={{ display:"none" }}
          onChange={e => { if (e.target.files?.[0]) importTags(e.target.files[0]); e.target.value = ""; }} />
      </header>

      {importStats && !importStats.error && (
        <div style={{ ...S.panel, padding:"9px 12px", marginBottom:12, fontSize:12, color:"#8A9AA0",
          display:"flex", gap:12, flexWrap:"wrap" }}>
          <span style={{ color:"#7FB8AD" }}>✓ {importStats.total.toLocaleString()}曲</span>
          {importStats.noKey > 0 && <span>キーなし {importStats.noKey.toLocaleString()}</span>}
          {importStats.noBpm > 0 && <span>BPMなし {importStats.noBpm.toLocaleString()}</span>}
        </div>
      )}
      {importStats?.error && (
        <div style={{ ...S.panel, padding:"9px 12px", marginBottom:12, fontSize:12, color:"#C4675C" }}>
          {importStats.error}
        </div>
      )}

      {mappingState && (
        <div style={{ ...S.panel, padding:14, marginBottom:14, border:"1px solid #7FB8AD" }}>
          <div style={{ ...S.label, marginBottom:4 }}>Column mapping</div>
          <div style={{ fontSize:12, color:"#8A9AA0", marginBottom:12 }}>
            カラムを自動検出しました({mappingState.rows.length.toLocaleString()}行)。
          </div>
          <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:14 }}>
            {[["title","曲名 *"],["artist","アーティスト"],["bpm","BPM"],["key","キー"],["mode","Mode"],["energy","Energy"],["genre","ジャンル"],["label","レーベル"],["year","年(リリース日)"],["url","Spotifyリンク"]].map(([f, jp]) => (
              <label key={f} style={{ display:"flex", flexDirection:"column", gap:4, flex:"1 1 140px" }}>
                <span style={{ ...S.label, letterSpacing:1 }}>{jp}</span>
                <select value={mappingState.map[f]}
                  onChange={e => setMappingState(m => ({ ...m, map: { ...m.map, [f]: e.target.value } }))}>
                  <option value="">— なし —</option>
                  {mappingState.headers.map(h => <option key={h} value={h}>{h}</option>)}
                </select>
              </label>
            ))}
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={runImport} disabled={!mappingState.map.title} style={{
              padding:"10px 20px", borderRadius:6, fontSize:14, fontWeight:500,
              border:"none", background: mappingState.map.title ? "#7FB8AD" : "#2A3438",
              color: mappingState.map.title ? "#0D1113" : "#5C6B70" }}>
              インポート
            </button>
            <button onClick={() => setMappingState(null)} style={{
              padding:"10px 16px", borderRadius:6, fontSize:14,
              border:"1px solid #2A3438", background:"transparent", color:"#8A9AA0" }}>
              キャンセル
            </button>
          </div>
        </div>
      )}

      {isMobile ? (
        <>
          {tab === "lib" && LibraryView}
          {tab === "next" && NextView}
          {tab === "set" && SetView}

          {/* Bottom tab bar */}
          <nav style={{
            position:"fixed", bottom:0, left:0, right:0, zIndex:10,
            display:"flex", background:"#10161A", borderTop:"1px solid #222B2F",
            paddingBottom:"env(safe-area-inset-bottom)" }}>
            {[["lib","ライブラリ"],["next","次曲"],["set",`セット${setList.length ? ` (${setList.length})` : ""}`]].map(([k, l]) => (
              <button key={k} onClick={() => setTab(k)} style={{
                flex:1, padding:"13px 0", border:"none", fontSize:13, fontWeight:500,
                background:"transparent",
                color: tab === k ? "#7FB8AD" : "#5C6B70",
                borderTop: tab === k ? "2px solid #7FB8AD" : "2px solid transparent" }}>
                {l}
              </button>
            ))}
          </nav>
        </>
      ) : (
        <div style={{ display:"flex", gap:16, alignItems:"flex-start" }}>
          <div style={{ flex:"2 1 460px", minWidth:320 }}>{LibraryView}</div>
          <div style={{ flex:"1 1 300px", minWidth:280, display:"flex", flexDirection:"column", gap:12 }}>
            {NextView}
            {SetView}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TrackDeck />);
</script>
</body>
</html>
